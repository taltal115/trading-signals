# Manual AI evaluation: context + OpenAI JSON + blended score → Firestore (position or signals doc).
name: AI stock evaluation

on:
  workflow_dispatch:
    inputs:
      ticker:
        description: "Ticker symbol"
        required: true
      signal_doc_id:
        description: "Firestore signals document id"
        required: true
      position_id:
        description: "my_positions document id (empty = write only to signals.ai_evaluations)"
        required: false
        default: ""
      owner_uid:
        description: "Firebase uid for position owner (empty if no position_id)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check Firestore credentials secret
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}
        run: |
          if [ -z "${GOOGLE_APPLICATION_CREDENTIALS:-}" ]; then
            echo "::error::Set repository secret GOOGLE_APPLICATION_CREDENTIALS. See README.md."
            exit 1
          fi

      - name: Run AI evaluation
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          POS_ARG=""
          if [ -n "${{ github.event.inputs.position_id }}" ]; then
            POS_ARG="--position-id ${{ github.event.inputs.position_id }}"
          fi
          OWN_ARG=""
          if [ -n "${{ github.event.inputs.owner_uid }}" ]; then
            OWN_ARG="--owner-uid ${{ github.event.inputs.owner_uid }}"
          fi
          PYTHONPATH=./src:. python -m scripts.ai_stock_eval.main \
            --config config.yaml \
            --ticker "${{ github.event.inputs.ticker }}" \
            --signal-doc-id "${{ github.event.inputs.signal_doc_id }}" \
            $POS_ARG \
            $OWN_ARG
