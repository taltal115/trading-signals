# Manual AI evaluation: context + OpenAI JSON + blended score → Firestore (nested under signals[] on run doc; optional my_positions.ai_evaluation).
name: AI stock evaluation

on:
  workflow_dispatch:
    inputs:
      ticker:
        description: "Ticker symbol"
        required: true
      signal_doc_id:
        description: "Firestore run document id (signals_new or legacy signals; same id shown on the Signals page)"
        required: true
      position_id:
        description: "my_positions document id (empty = only merge into run doc signals[]; if set, also updates position.ai_evaluation)"
        required: false
        default: ""
      owner_uid:
        description: "Firebase uid for position owner (empty if no position_id)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check Firestore credentials secret
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}
        run: |
          if [ -z "${GOOGLE_APPLICATION_CREDENTIALS:-}" ]; then
            echo "::error::Set repository secret GOOGLE_APPLICATION_CREDENTIALS. See README.md."
            exit 1
          fi

      - name: Verify evaluation context (history, Finnhub, Firestore score)
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: |
          POS_ARG=""
          if [ -n "${{ github.event.inputs.position_id }}" ]; then
            POS_ARG="--position-id ${{ github.event.inputs.position_id }}"
          fi
          OWN_ARG=""
          if [ -n "${{ github.event.inputs.owner_uid }}" ]; then
            OWN_ARG="--owner-uid ${{ github.event.inputs.owner_uid }}"
          fi
          PYTHONPATH=./src:. python -m scripts.ai_stock_eval.main \
            --config config.yaml \
            --ticker "${{ github.event.inputs.ticker }}" \
            --signal-doc-id "${{ github.event.inputs.signal_doc_id }}" \
            --verify-only \
            --github-verify-annotations \
            $POS_ARG \
            $OWN_ARG

      - name: Check OpenAI API key secret
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "${OPENAI_API_KEY:-}" ]; then
            echo "::error::Set repository secret OPENAI_API_KEY. Without it the job would run source=stub (no real LLM). See .env.example."
            exit 1
          fi

      - name: Run AI evaluation (prints prompts, then OpenAI + Firestore write)
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          POS_ARG=""
          if [ -n "${{ github.event.inputs.position_id }}" ]; then
            POS_ARG="--position-id ${{ github.event.inputs.position_id }}"
          fi
          OWN_ARG=""
          if [ -n "${{ github.event.inputs.owner_uid }}" ]; then
            OWN_ARG="--owner-uid ${{ github.event.inputs.owner_uid }}"
          fi
          PYTHONPATH=./src:. python -m scripts.ai_stock_eval.main \
            --config config.yaml \
            --ticker "${{ github.event.inputs.ticker }}" \
            --signal-doc-id "${{ github.event.inputs.signal_doc_id }}" \
            --debug-prompt \
            $POS_ARG \
            $OWN_ARG
