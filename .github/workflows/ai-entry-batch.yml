# Batch AI entry eval for pending BUY rows (opens/refreshes paper positions).
name: AI entry batch

on:
  workflow_dispatch:
    inputs:
      signal_doc_id:
        description: "Firestore signals run doc id (empty = latest)"
        required: false
        default: ""
  # After typical Premarket scan (~08:30 ET). 13:30 & 14:00 UTC cover EST/EDT.
  schedule:
    - cron: "30 13 * * 1-5"
    - cron: "0 14 * * 1-5"
  # Chain when Premarket trading bot scan finishes successfully.
  workflow_run:
    workflows: ["Premarket trading bot scan"]
    types: [completed]

permissions:
  contents: read

jobs:
  entry-batch:
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check secrets
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "${GOOGLE_APPLICATION_CREDENTIALS:-}" ]; then
            echo "::error::Set GOOGLE_APPLICATION_CREDENTIALS"
            exit 1
          fi
          if [ -z "${OPENAI_API_KEY:-}" ]; then
            echo "::error::Set OPENAI_API_KEY"
            exit 1
          fi

      - name: Run AI entry batch
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NEWSAPI_API_KEY: ${{ secrets.NEWSAPI_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          USE_NEWSAPI: ${{ vars.USE_NEWSAPI || 'true' }}
          USE_GDELT: ${{ vars.USE_GDELT || 'true' }}
          USE_FRED: ${{ vars.USE_FRED || 'true' }}
        run: |
          DOC_ARG=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.signal_doc_id }}" ]; then
            DOC_ARG="--signal-doc-id ${{ github.event.inputs.signal_doc_id }}"
          fi
          PYTHONPATH=./src:. python -m scripts.ai_stock_eval.main \
            --config config.yaml \
            --batch \
            $DOC_ARG
