name: Hourly Trading Bot Scan

on:
  schedule:
    # Run every hour, Monday through Friday, during market hours (approx 14:00 - 21:00 UTC)
    - cron: "0 14-21 * * 1-5"
  workflow_dispatch:
    inputs:
      ticker:
        description: 'Single ticker to re-evaluate (leave empty for full scan)'
        required: false
        default: ''

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check Firestore credentials secret
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}
        run: |
          if [ -z "${GOOGLE_APPLICATION_CREDENTIALS:-}" ]; then
            echo "::error::Set repository secret GOOGLE_APPLICATION_CREDENTIALS to the full service account JSON. See README.md."
            exit 1
          fi

      - name: Run Trading Bot
        env:
          FLEX_API_KEY: ${{ secrets.FLEX_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: "#trading-signals"
          GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}
        run: |
          TICKER_ARG=""
          if [ -n "${{ github.event.inputs.ticker }}" ]; then
            TICKER_ARG="--ticker ${{ github.event.inputs.ticker }}"
          fi
          PYTHONPATH=./src python -m signals_bot.main --config config.yaml $TICKER_ARG

