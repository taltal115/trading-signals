name: Premarket trading bot scan

on:
  schedule:
    # ~1 hour before US cash open (09:30 America/New_York). UTC crons + NY gate (see below).
    - cron: "30 12 * * 1-5"
    - cron: "30 13 * * 1-5"
  workflow_dispatch:
    inputs:
      ticker:
        description: 'Single ticker to re-evaluate (leave empty for full scan)'
        required: false
        default: ''

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Gate (~08:30 America/New_York, Mon–Fri) or manual dispatch
        id: gate
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "manual workflow_dispatch → run"
            exit 0
          fi
          python3 <<'PY'
          from datetime import datetime
          from zoneinfo import ZoneInfo
          import os

          ny = datetime.now(ZoneInfo("America/New_York"))
          if ny.weekday() >= 5:
              print("run=false — weekend")
              open(os.environ["GITHUB_OUTPUT"], "a").write("run=false\n")
              raise SystemExit(0)
          # Target ~1h before 09:30 ET open → 08:30 local.
          ok = ny.hour == 8 and 5 <= ny.minute <= 55
          print(f"NY={ny.isoformat()} gate_ok={ok} (want ~08:30 ET)")
          open(os.environ["GITHUB_OUTPUT"], "a").write(f"run={'true' if ok else 'false'}\n")
          PY

      - name: Checkout code
        if: steps.gate.outputs.run == 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.gate.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        if: steps.gate.outputs.run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check Firestore credentials secret
        if: steps.gate.outputs.run == 'true'
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}
        run: |
          if [ -z "${GOOGLE_APPLICATION_CREDENTIALS:-}" ]; then
            echo "::error::Set repository secret GOOGLE_APPLICATION_CREDENTIALS to the full service account JSON. See README.md."
            exit 1
          fi

      - name: Run Trading Bot
        if: steps.gate.outputs.run == 'true'
        env:
          FLEX_API_KEY: ${{ secrets.FLEX_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          # Optional. Use channel ID (C…) from Slack → channel details if #name gives channel_not_found.
          # If unset, bot uses config.yaml slack.channel (default #trading-signals).
          SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}
        run: |
          TICKER_ARG=""
          if [ -n "${{ github.event.inputs.ticker }}" ]; then
            TICKER_ARG="--ticker ${{ github.event.inputs.ticker }}"
          fi
          PYTHONPATH=./src python -m signals_bot.main --config config.yaml $TICKER_ARG
