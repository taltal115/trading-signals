# Daily upcoming financial events for top universe symbols → Firestore (`stock_events/{asof_date}`).
#
# Schedule: weekdays ~08:00 America/New_York (after universe discovery ~07:30).
# GitHub `schedule` is UTC-only; crons at 12:00 and 13:00 UTC with NY gate.
name: Daily stock events discovery

on:
  schedule:
    - cron: "0 12 * * 1-5"
    - cron: "0 13 * * 1-5"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  events:
    runs-on: ubuntu-latest
    steps:
      - name: Gate (~08:00 America/New_York, Mon–Fri) or manual dispatch
        id: gate
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "manual workflow_dispatch → run"
            exit 0
          fi
          python3 <<'PY'
          from datetime import datetime
          from zoneinfo import ZoneInfo
          import os

          ny = datetime.now(ZoneInfo("America/New_York"))
          if ny.weekday() >= 5:
              print("run=false — weekend")
              open(os.environ["GITHUB_OUTPUT"], "a").write("run=false\n")
              raise SystemExit(0)
          ok = ny.hour == 8 and 5 <= ny.minute <= 55
          print(f"NY={ny.isoformat()} gate_ok={ok} (want ~08:00 ET)")
          open(os.environ["GITHUB_OUTPUT"], "a").write(f"run={'true' if ok else 'false'}\n")
          PY

      - name: Checkout
        if: steps.gate.outputs.run == 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.gate.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        if: steps.gate.outputs.run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check Firestore credentials secret
        if: steps.gate.outputs.run == 'true'
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}
        run: |
          if [ -z "${GOOGLE_APPLICATION_CREDENTIALS:-}" ]; then
            echo "::error::Set repository secret GOOGLE_APPLICATION_CREDENTIALS to the full service account JSON. See README.md."
            exit 1
          fi

      - name: Run stock events discovery
        if: steps.gate.outputs.run == 'true'
        timeout-minutes: 180
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}
        run: |
          PYTHONPATH=./src python scripts/discover_stock_events.py --config config.yaml --top-symbols 1000
