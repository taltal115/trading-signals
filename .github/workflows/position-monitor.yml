# Manual positions monitor: reads Firestore `my_positions` (status=open), spot checks via Yahoo/Stooq,
# logs BUY/WAIT/SELL-style lines, optional Slack when alert *kind* changes (deduped).
name: Position monitor

on:
  schedule:
    - cron: "25 14-21 * * 1-5"
  workflow_dispatch:
    inputs:
      ticker:
        description: 'Single ticker to check (leave empty for all)'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check Firestore credentials secret
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}
        run: |
          if [ -z "${GOOGLE_APPLICATION_CREDENTIALS:-}" ]; then
            echo "::error::Set repository secret GOOGLE_APPLICATION_CREDENTIALS to the full service account JSON. See README.md."
            exit 1
          fi

      # Omit or clear MONITOR_OWNER_UID to evaluate **all** users' open `my_positions` rows (multi-tenant cron).
      # Set secret MONITOR_OWNER_UID only when you want single-account monitoring.
      - name: Monitor open positions
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL }}
          MONITOR_OWNER_UID: ${{ secrets.MONITOR_OWNER_UID }}
          # When true (default), marks my_positions rows closed on TARGET_HIT / STOP_HIT at monitor spot (confirm broker fill).
          MONITOR_AUTO_CLOSE: "true"
        run: |
          TICKER_ARG=""
          if [ -n "${{ github.event.inputs.ticker }}" ]; then
            TICKER_ARG="--ticker ${{ github.event.inputs.ticker }}"
          fi
          PYTHONPATH=./src python scripts/monitor_open_positions.py --config config.yaml $TICKER_ARG
