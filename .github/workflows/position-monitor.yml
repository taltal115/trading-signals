# Manual positions monitor: reads Firestore `my_positions` (status=open), spot checks via Yahoo/Stooq,
# logs BUY/WAIT/SELL-style lines, optional Slack when alert *kind* changes (deduped).
name: Position monitor

on:
  schedule:
    - cron: "25 14-21 * * 1-5"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Monitor open positions
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: "#trading-signals"
          MONITOR_OWNER_UID: ${{ secrets.MONITOR_OWNER_UID }}
        run: |
          PYTHONPATH=./src python scripts/monitor_open_positions.py --config config.yaml
