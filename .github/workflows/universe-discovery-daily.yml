# Daily Finnhub → strategy-filtered universe snapshot to Firestore (`universe/{asof_date}`).
# Persists `data/universe_state.json` via workflow artifacts so batch rotation continues across runs.
name: Daily universe discovery

on:
  schedule:
    # Mon–Fri 12:00 UTC ≈ 15:00 Israel Daylight Time (IDT, UTC+3, typically late Mar–late Oct),
    # i.e. before US cash open (~09:30 ET ≈ 16:30 Israel in this season).
    # During Israel Standard Time (IST, UTC+2), 12:00 UTC = 14:00 in Israel; switch this line
    # to `0 13 * * 1-5` from ~late Oct–late Mar for ~15:00 IST. GitHub cron is UTC-only.
    - cron: "0 12 * * 1-5"
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  discovery:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check Firestore credentials secret
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}
        run: |
          if [ -z "${GOOGLE_APPLICATION_CREDENTIALS:-}" ]; then
            echo "::error::Set repository secret GOOGLE_APPLICATION_CREDENTIALS to the full service account JSON. See README.md."
            exit 1
          fi

      - name: Restore Finnhub batch rotation state
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: universe-discovery-daily.yml
          name: universe-discovery-state
          path: .
          search_artifacts: true
          if_no_artifact_found: ignore

      - name: Run universe discovery
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}
        run: |
          mkdir -p data
          PYTHONPATH=./src python scripts/update_universe_finnhub.py \
            --config config.yaml \
            --state data/universe_state.json \
            --max-calls 2000 \
            --merge-days 7

      - name: Save Finnhub batch rotation state
        uses: actions/upload-artifact@v4
        with:
          name: universe-discovery-state
          path: data/universe_state.json
          retention-days: 120
          if-no-files-found: warn
