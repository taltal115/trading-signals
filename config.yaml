run:
  name: "daily_close_scan"
  timezone: "America/New_York"

universe:
  # Firestore: daily snapshot written by ./run.sh discovery (collection universe/{YYYY-MM-DD}).
  # When enabled, symbols / CSV / symbols_dir below are ignored for the scan.
  firestore:
    enabled: true
    collection: "universe"
    fallback_latest: true
  # Option A: inline symbols (used only when firestore.enabled is false)
  symbols: []
  # Option B: single CSV with a `symbol` column
  symbols_csv: null
  # Option B2: directory of CSVs; all `symbol` columns are merged
  symbols_dir: null
  # Option C: IBKR scanner (dynamic intraday universe)
  # When enabled, the bot will pull symbols from IBKR scanners each run and merge with symbols/symbols_csv.
  ibkr_scanner:
    enabled: false
    merge_with_static: true
    max_symbols: 1000
    # Common scan codes: TOP_PERC_GAIN, HOT_BY_VOLUME, MOST_ACTIVE
    scan_codes: ["TOP_PERC_GAIN", "HOT_BY_VOLUME"]
    instrument: "STK"
    location_code: "STK.US.MAJOR"

data:
  lookback_days: 180
  # Yahoo first: Stooq daily CSV requests now require registering an API key (?apikey=).
  # Prefer Yahoo for reliability unless you set `stooq_api_key` below or STOOQ_API_KEY in `.env`.
  provider_order: ["yahoo", "stooq"]
  # Optional — only if `stooq` is in provider_order (see https://stooq.com/q/d/).
  # stooq_api_key:
  request_timeout_sec: 20
  # If your network uses SSL interception (corporate proxy), set a CA bundle path.
  # Example: "/path/to/corporate-ca.pem"
  ca_bundle_path: null
  # Keep true for security. Only set false temporarily if you can't get a CA bundle working.
  ssl_verify: true

ibkr:
  # TWS / IB Gateway connection settings (local machine defaults)
  host: "127.0.0.1"
  # Common ports: 7497 (TWS paper), 7496 (TWS live), 4002 (Gateway paper), 4001 (Gateway live)
  port: 7497
  client_id: 7
  connect_timeout_sec: 5
  # Client Portal Gateway (https://localhost:5000) — live portfolio; see docs/ibkr-client-portal-gateway-plan.md
  client_portal:
    enabled: true
    base_url: "https://localhost:5000/v1/api"
    verify_ssl: false
    account_id: ""
    collection: "ibkr_portfolio"
    snapshot_max_age_min: 30
    sync_interval_min: 5

strategy:
  # Filters
  price_min: 2.0
  price_max: 1000.0
  avg_dollar_vol_min: 5_000_000   # was 10M; loosened for more tradable names
  atr_pct_min: 2.0
  # Backtest: ATR 3-5% was best (56% win, PF 1.75); 5-7% was worst (38% win). Tightened the
  # standard ceiling to 10 to cut the volatile tail. High-volume fresh breakouts / ignition
  # (STAK-style, e.g. 13% ATR) still get in via ignite_atr_pct_max below.
  atr_pct_max: 10.0

  # Breakout + momentum thresholds.
  # Backtest (113 BUYs, Jan–Jun 2026): tighter thresholds did NOT improve quality —
  # extreme momentum (ret_5d>30, ret_10d>60) and high confidence were net-negative.
  # Lowered the floors to add traffic without chasing overextended breakouts.
  breakout_lookback_days: 20
  breakout_dist_pct_max: 2.0    # was 0.8; allow near-breakouts (more traffic)
  ret_5d_min_pct: 8.0           # was 12.0
  ret_10d_min_pct: 12.0         # was 18.0
  # Overextension caps (0 = disabled). Research 2026-07-20: tightened from 30/60 to 25/50.
  # July blow-ups (LHSW, LHAI, SUNE, QTTB) all had extreme prior momentum.
  ret_5d_max_pct: 25.0
  ret_10d_max_pct: 50.0
  # STAK 2026-06-03: high 5d/10d returns but fresh breakout + vol_ratio 5.4× — allow through.
  overextension_bypass_vol_ratio: 5.0
  # STAK 2026-06-02: +95% 1-day surge, 9× volume, 22% below 20d high — buy before breakout day.
  ignite_vol_ratio_min: 8.0
  ignite_ret_1d_min_pct: 50.0
  ignite_prior_high_dist_pct_max: 25.0
  ignite_atr_pct_max: 20.0
  ignite_price_min: 1.0           # STAK was $1.90 on ignition day (below standard price_min 2.0)
  vol_ratio_min: 2.0            # was 3.0; volume / avg20 volume

  # BUY must meet breakout rules AND reach this confidence (0 = disabled).
  # Backtest showed confidence is NOT predictive of returns, so the high 85 floor
  # only throttled traffic. Lowered to 70.
  min_buy_confidence: 70

  # Ranking soft band (2026-07 follow-up): prefer ret_5d in 8–20% for Slack/top-N.
  # Outside the band is demoted; confidence is only a tiebreaker.
  ret_5d_prefer_min_pct: 8.0
  ret_5d_prefer_max_pct: 20.0
  # Lottery flag: vol ≥ 5× or ret_5d ≥ 50% — demoted; Slack only after AI pass.
  lottery_vol_ratio_min: 5.0
  lottery_ret_5d_min_pct: 50.0

  # Confidence band ranking (2026-07-20 research follow-up #2):
  # Data shows conf=100 has 16.7% win rate (−18.38% avg), while conf 90–94 has 60% win rate (+0.72% avg).
  # Signals with conf >= high_confidence_risk_threshold are flagged as high-risk and PENALIZED in ranking.
  # Signals in prefer_confidence range get a BONUS. AI pass required for high-risk signals.
  high_confidence_risk_threshold: 98
  prefer_confidence_min: 90
  prefer_confidence_max: 94

  # Position guidance (manual)
  max_hold_days: 5              # ceiling; actual hold is ATR-based per signal (2..max)
  # Trailing exit (research: 2026-06-28 cohort — 74% of trades exited on a fixed time limit;
  # winners like ODD/PAR/MAX kept improving from day 3 to day 5). Once held >= this many
  # sessions AND still above entry AND above the prior session's low, keep riding up to
  # max_hold_days instead of forcing a time exit. 0 disables (fixed exit at max_hold_days).
  trailing_min_hold_days: 3
  stop_atr_mult: 1.5
  target_atr_mult: 2.5         # was 3.0; 3x ATR target was hit in only 13/110 trades

  # Ranking weights
  weights:
    breakout: 0.40
    momentum: 0.35
    volume: 0.25

sqlite:
  enabled: true
  path: "./data/signals.db"

slack:
  enabled: true
  channel: "#trading-signals"
  post_top_n: 5
  min_confidence: 70
  # Defer Slack to AI entry batch; only post ai_gate=passed BUYs (2026-07 follow-up).
  require_ai_passed: true

logging:
  level: "INFO"

# AI entry gate + holding advisor (see docs/ai-signal-pipeline/)
ai:
  enabled: true
  entry_min_total: 70
  entry_min_conviction: 0.7
  # Entry LLM only on top-N BUYs by signal_quality rank; rest get ai_gate=skipped (no tokens).
  max_entry_evals_per_run: 5
  max_holding_evals_per_run: 10
  # Spend budget on entry; avoid re-advising the same paper name every cron tick.
  holding_min_hours_between_evals: 12
  # Lottery BUYs (extreme vol / ret_5d) need a harder AI pass + pro model.
  lottery_entry_min_total: 80
  lottery_entry_min_conviction: 0.8
  lottery_force_pro_model: true
  # Legacy alias; entry_model wins for the entry gate.
  model: gpt-5.4
  entry_model: gpt-5.4
  holding_model: gpt-5.4-mini
  # When blended technical_score (features) >= this, entry uses pro_model instead.
  pro_model: gpt-5.4-pro
  pro_min_technical_score: 75
  # Optional USD per 1M tokens for estimated_cost_usd on ai_evals
  pricing:
    gpt-5.4:
      prompt_per_1m: 2.5
      completion_per_1m: 15.0
    gpt-5.4-mini:
      prompt_per_1m: 0.75
      completion_per_1m: 4.5
    gpt-5.4-pro:
      prompt_per_1m: 30.0
      completion_per_1m: 180.0

