run:
  name: "daily_close_scan"
  timezone: "America/New_York"

universe:
  # Firestore: daily snapshot written by ./run.sh discovery (collection universe/{YYYY-MM-DD}).
  # When enabled, symbols / CSV / symbols_dir below are ignored for the scan.
  firestore:
    enabled: true
    collection: "universe"
    fallback_latest: true
  # Option A: inline symbols (used only when firestore.enabled is false)
  symbols: []
  # Option B: single CSV with a `symbol` column
  symbols_csv: null
  # Option B2: directory of CSVs; all `symbol` columns are merged
  symbols_dir: null
  # Option C: IBKR scanner (dynamic intraday universe)
  # When enabled, the bot will pull symbols from IBKR scanners each run and merge with symbols/symbols_csv.
  ibkr_scanner:
    enabled: false
    merge_with_static: true
    max_symbols: 1000
    # Common scan codes: TOP_PERC_GAIN, HOT_BY_VOLUME, MOST_ACTIVE
    scan_codes: ["TOP_PERC_GAIN", "HOT_BY_VOLUME"]
    instrument: "STK"
    location_code: "STK.US.MAJOR"

data:
  lookback_days: 180
  # Yahoo first: Stooq daily CSV requests now require registering an API key (?apikey=).
  # Prefer Yahoo for reliability unless you set `stooq_api_key` below or STOOQ_API_KEY in `.env`.
  provider_order: ["yahoo", "stooq"]
  # Optional — only if `stooq` is in provider_order (see https://stooq.com/q/d/).
  # stooq_api_key:
  request_timeout_sec: 20
  # If your network uses SSL interception (corporate proxy), set a CA bundle path.
  # Example: "/path/to/corporate-ca.pem"
  ca_bundle_path: null
  # Keep true for security. Only set false temporarily if you can't get a CA bundle working.
  ssl_verify: true

ibkr:
  # TWS / IB Gateway connection settings (local machine defaults)
  host: "127.0.0.1"
  # Common ports: 7497 (TWS paper), 7496 (TWS live), 4002 (Gateway paper), 4001 (Gateway live)
  port: 7497
  client_id: 7
  connect_timeout_sec: 5
  # Client Portal Gateway (https://localhost:5000) — live portfolio; see docs/ibkr-client-portal-gateway-plan.md
  client_portal:
    enabled: true
    base_url: "https://localhost:5000/v1/api"
    verify_ssl: false
    account_id: ""
    collection: "ibkr_portfolio"
    snapshot_max_age_min: 30
    sync_interval_min: 5

strategy:
  # Filters
  price_min: 2.0
  price_max: 1000.0
  avg_dollar_vol_min: 10_000_000
  atr_pct_min: 3.0
  atr_pct_max: 14.0

  # Breakout + momentum thresholds (stricter = fewer, higher-quality BUY setups)
  breakout_lookback_days: 20
  breakout_dist_pct_max: 0.8    # tighter = higher confidence
  ret_5d_min_pct: 12.0
  ret_10d_min_pct: 18.0
  vol_ratio_min: 3.0            # volume / avg20 volume

  # BUY must meet breakout rules AND reach this confidence (0 = disabled)
  min_buy_confidence: 85

  # Position guidance (manual)
  max_hold_days: 5              # ceiling; actual hold is ATR-based per signal (2..max)
  stop_atr_mult: 1.5
  target_atr_mult: 3.0

  # Ranking weights
  weights:
    breakout: 0.40
    momentum: 0.35
    volume: 0.25

sqlite:
  enabled: true
  path: "./data/signals.db"

slack:
  enabled: true
  channel: "#trading-signals"
  post_top_n: 5
  min_confidence: 85

logging:
  level: "INFO"

# Upcoming financial events for top universe symbols (scripts/discover_stock_events.py).
events:
  top_symbols: 1000
  horizon_days: 21
  rank_by: last_score
  collection: stock_events
  recommendations_top_n: 8
  min_recommendation_score: 55
  setup_min_score: 70
  watch_min_score: 55
  history_quarters: 8
  pre_event_ret_5d_cap_pct: 12.0
  pre_event_ret_10d_cap_pct: 20.0
  finnhub_symbol_gap_sec: 1.2
  vol_ratio_min: 1.5
  # Cap Yahoo calendar fallback calls (top by score among symbols missing Finnhub earnings).
  yahoo_fallback_max: 200

